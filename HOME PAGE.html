<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Movie Ticket System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .hero-banner {
            position: relative;
            height: 80vh;
            min-height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 40px;
            margin-top: 0;
        }

        .hero-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #f3eeff;
            /* Clean light purple */
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-title {
            font-size: 4.5rem;
            color: var(--text-main);
            font-weight: 700;
            margin-bottom: 10px;
            animation: fadeUp 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .hero-meta {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 30px;
            animation: fadeUp 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.2s both;
        }

        .hero-tag {
            background: rgba(255, 255, 255, 1);
            color: var(--primary-color);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            border: 1px solid var(--primary-color);
            font-weight: 600;
        }

        .hero-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            animation: fadeUp 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.4s both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .featured-banner {
            display: flex;
            gap: 48px;
            align-items: center;
            background: radial-gradient(circle at center, rgba(0, 0, 0, 0.7) 0%, rgba(0, 0, 0, 0.4) 100%), url('https://assets-in.bmscdn.com/promotions/cms/creatives/1726036136110_kalkinewdes.jpg') center/cover no-repeat;
            padding: 60px;
            border-radius: var(--radius-lg);
            min-height: 500px;
            margin-top: 60px;
        }

        .featured-poster {
            flex: 0 0 280px;
        }

        .featured-poster img {
            width: 100%;
            height: 380px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: block;
        }

        .featured-info {
            flex: 1;
        }

        .featured-pill {
            background-color: var(--primary-color);
            color: #ffffff;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .featured-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .featured-badges {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .f-badge {
            background-color: #ffffff;
            color: #1a1a1a;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 20px;
        }

        .featured-desc {
            color: #cccccc;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 35px;
            max-width: 600px;
        }

        .featured-actions {
            display: flex;
            gap: 15px;
        }

        .featured-btn-outline {
            border-color: #ffffff;
            color: #ffffff;
            background: transparent;
        }

        .featured-btn-outline:hover {
            background-color: #ffffff;
            color: var(--ink-brown);
        }

        @media (max-width: 900px) {
            .featured-banner {
                flex-direction: column;
                text-align: center;
                padding: 40px 20px;
            }

            .featured-badges {
                justify-content: center;
            }

            .featured-actions {
                justify-content: center;
                flex-direction: column;
            }

            .featured-poster {
                flex: 0 0 auto;
            }

            .featured-poster img {
                height: auto;
                max-width: 250px;
                margin: 0 auto;
            }
        }
    </style>
</head>

<body class="page-transitioning">

    <div id="global-loader">
        <div class="spinner"></div>
    </div>
    <div id="navbar-container"></div>

    <div id="hero-banner-container"></div>

    <div class="main-content container" style="padding-top: 20px;">

        <!-- Now Showing Carousel -->
        <div class="fade-in-section mb-4">
            <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px;">
                <h2 style="margin: 0;">Now Showing in <span id="current-city-label"
                        style="color: var(--primary-color);"></span></h2>
                <a href="movies.html" class="text-muted transition-link"
                    style="font-size:0.95rem; font-weight: 500;">View All</a>
            </div>
            <div class="carousel-container">
                <button class="carousel-btn carousel-prev" onclick="scrollCarousel('movies-carousel', -300)">‹</button>
                <div id="movies-carousel" class="carousel"></div>
                <button class="carousel-btn carousel-next" onclick="scrollCarousel('movies-carousel', 300)">›</button>
            </div>
        </div>

        <!-- Featured Movie Banner -->
        <div class="fade-in-section featured-banner mb-4">
            <div class="featured-poster">
                <img src="https://assets-in.bmscdn.com/discovery-catalog/events/tr:w-400,h-600,bg-CCCCCC/et00310216-vxnzhpckwq-portrait.jpg"
                    alt="Kalki 2898 AD" />
            </div>
            <div class="featured-info">
                <span class="featured-pill">Featured Film</span>
                <h2 class="featured-title">Kalki 2898 AD</h2>
                <div class="featured-badges">
                    <span class="f-badge">IMDb 8.5</span>
                    <span class="f-badge">Action, Sci-Fi</span>
                    <span class="f-badge">3h 5m</span>
                    <span class="f-badge">U/A</span>
                </div>
                <p class="featured-desc">A modern-day avatar of Vishnu, a Hindu god, who is believed to have descended
                    to earth to protect the world from evil forces. An epic sci-fi journey merging myth and future.</p>
                <div class="featured-actions">
                    <button class="btn btn-primary"
                        onclick="const c = localStorage.getItem('selectedCity') || 'Delhi'; window.location.href='theatre-selection.html?id=1&type=movie&city='+c"
                        style="font-size: 1rem; padding: 12px 28px;">Book Tickets</button>
                    <button class="btn btn-outline featured-btn-outline"
                        onclick="openTrailer(event, 'https://www.youtube.com/embed/y1QXuQvngG8')"
                        style="font-size: 1rem; padding: 12px 28px;">Watch Trailer</button>
                </div>
            </div>
        </div>

    </div>

    <div id="footer-container"></div>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.body.classList.remove('page-transitioning');

            const city = localStorage.getItem("selectedCity") || "Delhi";
            document.getElementById("current-city-label").innerText = city;



            // Load Hero Banner
            const featured = movies.find(m => m.isFeatured) || movies[0];
            const heroHtml = `
                <div class="hero-banner" style="background: url('${featured.heroImage || featured.poster}') center/top/cover no-repeat;">
                    <div class="container hero-content">
                        <span style="color: var(--primary-color); font-weight:600; letter-spacing:1px; margin-bottom:10px;">Global Premiere</span>
                        <h1 class="hero-title">${featured.title}</h1>
                        <div class="hero-meta">
                            <span class="hero-tag">★ ${featured.rating}</span>
                            <span class="hero-tag">${featured.genre}</span>
                            <span class="hero-tag">${featured.duration}</span>
                            <span class="hero-tag">${featured.censor}</span>
                        </div>
                        <div class="hero-actions" style="display:flex; gap:15px; margin-top:20px;">
                            <button onclick="const c = localStorage.getItem('selectedCity') || 'Delhi'; window.location.href='theatre-selection.html?id=${featured.id}&type=movie&city='+c" class="btn btn-primary transition-link" style="padding: 15px 35px; font-size:1rem;">Book Tickets</button>
                            <button class="btn btn-outline" style="padding: 15px 35px;" onclick="openTrailer(event, '${featured.trailer}')">Watch Trailer</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById("hero-banner-container").innerHTML = heroHtml;

            // Load Movies based on City into Carousel
            const cityMovies = movies.filter(m => m.city.includes(city));
            const carouselContainer = document.getElementById("movies-carousel");

            if (cityMovies.length > 0) {
                carouselContainer.innerHTML = cityMovies.map(m => generateCardHTML(m, 'movie')).join('');
            } else {
                carouselContainer.innerHTML = `<p class="text-muted" style="width:100%; text-align:center;">No popular movies listed in ${city} right now.</p>`;
            }


        });

        function scrollCarousel(id, offset) {
            document.getElementById(id).scrollBy({ left: offset, behavior: 'smooth' });
        }
    </script>
</body>

</html>
