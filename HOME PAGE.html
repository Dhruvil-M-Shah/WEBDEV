<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Movie Ticket System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .hero-banner {
            position: relative;
            height: 80vh;
            min-height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 40px;
            margin-top: 0;
        }

        .hero-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, rgba(28, 10, 0, 0.3), rgba(28, 10, 0, 0.7));
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-title {
            font-size: 5rem;
            color: white;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
            margin-bottom: 10px;
            animation: fadeUp 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .hero-meta {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 30px;
            animation: fadeUp 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.2s both;
        }

        .hero-tag {
            background: rgba(245, 237, 214, 0.8);
            color: var(--ink-brown);
            padding: 4px 12px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            border: 1px dashed var(--accent-color);
            box-shadow: 2px 2px 0px rgba(59, 42, 26, 0.2);
            /* Vintage dashed tag */
            backdrop-filter: blur(4px);
        }

        .hero-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            animation: fadeUp 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.4s both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* India Map Layout */
        .map-section {
            display: flex;
            gap: 30px;
            margin-top: 60px;
            background: rgba(237, 224, 192, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(200, 169, 81, 0.4);
            border-radius: var(--radius-sm);
            padding: 40px;
            align-items: center;
            box-shadow: 4px 4px 20px rgba(59, 42, 26, 0.15);
        }

        .map-text {
            flex: 1;
        }

        .map-wrapper {
            flex: 1;
            position: relative;
            max-width: 500px;
        }
    </style>
</head>

<body class="page-transitioning">

    <div id="global-loader">
        <div class="spinner"></div>
    </div>
    <div id="navbar-container"></div>

    <div id="hero-banner-container"></div>

    <div class="main-content container" style="padding-top: 20px;">

        <!-- Now Showing Carousel -->
        <div class="fade-in-section mb-4">
            <div class="flex-between">
                <h2 class="section-heading-decorate">Now Showing in <span id="current-city-label"
                        style="color: var(--accent-color);"></span></h2>
                <a href="movies.html" class="text-muted transition-link"
                    style="text-transform:uppercase; font-size:0.9rem; letter-spacing:1px;">View All</a>
            </div>
            <div class="carousel-container">
                <button class="carousel-btn carousel-prev" onclick="scrollCarousel('movies-carousel', -300)">‹</button>
                <div id="movies-carousel" class="carousel"></div>
                <button class="carousel-btn carousel-next" onclick="scrollCarousel('movies-carousel', 300)">›</button>
            </div>
        </div>

        <!-- SVG Map City Selector -->
        <div class="fade-in-section map-section">
            <div class="map-text">
                <h2 class="section-heading-decorate" style="font-size:3rem; margin-bottom:20px;">Select Your <span
                        class="text-primary">City</span></h2>
                <p class="text-muted mb-4" style="font-size:1.1rem; max-width:400px;">Click a glowing point on the map
                    to switch your region and discover local events, movies, and exclusive experiences.</p>
                <div id="map-cities-list" style="display:flex; flex-wrap:wrap; gap:10px;">
                    <!-- JS will pop this -->
                </div>
            </div>
            <div class="map-wrapper india-map-container">
                <!-- Abstract India Map SVG -->
                <svg viewBox="0 0 400 450" xmlns="http://www.w3.org/2000/svg">
                    <!-- Base India Path (stylized abstract) -->
                    <path class="map-state"
                        d="M150 20 L180 10 L220 30 L250 80 L320 120 L350 160 L330 220 L270 250 L220 350 L180 420 L140 380 L100 280 L50 220 L60 150 L100 120 Z" />

                    <!-- Nodes (X, Y mapped roughly to path bounds) -->
                    <!-- Delhi -->
                    <g class="city-group" onclick="changeCity('Delhi')">
                        <circle class="city-node" id="node-Delhi" cx="170" cy="110" r="6" />
                        <text class="city-label" x="185" y="115">Delhi</text>
                    </g>
                    <!-- Mumbai -->
                    <g class="city-group" onclick="changeCity('Mumbai')">
                        <circle class="city-node" id="node-Mumbai" cx="100" cy="240" r="6" />
                        <text class="city-label" x="115" y="245">Mumbai</text>
                    </g>
                    <!-- Pune -->
                    <g class="city-group" onclick="changeCity('Pune')">
                        <circle class="city-node" id="node-Pune" cx="120" cy="260" r="6" />
                        <text class="city-label" x="135" y="265">Pune</text>
                    </g>
                    <!-- Bangalore -->
                    <g class="city-group" onclick="changeCity('Bangalore')">
                        <circle class="city-node" id="node-Bangalore" cx="160" cy="340" r="6" />
                        <text class="city-label" x="175" y="345">Bangalore</text>
                    </g>
                    <!-- Hyderabad -->
                    <g class="city-group" onclick="changeCity('Hyderabad')">
                        <circle class="city-node" id="node-Hyderabad" cx="180" cy="280" r="6" />
                        <text class="city-label" x="195" y="285">Hyderabad</text>
                    </g>
                    <!-- Chennai -->
                    <g class="city-group" onclick="changeCity('Chennai')">
                        <circle class="city-node" id="node-Chennai" cx="190" cy="360" r="6" />
                        <text class="city-label" x="205" y="365">Chennai</text>
                    </g>
                    <!-- Kolkata -->
                    <g class="city-group" onclick="changeCity('Kolkata')">
                        <circle class="city-node" id="node-Kolkata" cx="280" cy="200" r="6" />
                        <text class="city-label" x="295" y="205">Kolkata</text>
                    </g>
                    <!-- Ahmedabad -->
                    <g class="city-group" onclick="changeCity('Ahmedabad')">
                        <circle class="city-node" id="node-Ahmedabad" cx="80" cy="180" r="6" />
                        <text class="city-label" x="95" y="185">Ahmedabad</text>
                    </g>
                    <!-- Jaipur -->
                    <g class="city-group" onclick="changeCity('Jaipur')">
                        <circle class="city-node" id="node-Jaipur" cx="140" cy="140" r="6" />
                        <text class="city-label" x="155" y="145">Jaipur</text>
                    </g>
                    <!-- Indore -->
                    <g class="city-group" onclick="changeCity('Indore')">
                        <circle class="city-node" id="node-Indore" cx="150" cy="200" r="6" />
                        <text class="city-label" x="165" y="205">Indore</text>
                    </g>
                    <!-- Goa -->
                    <g class="city-group" onclick="changeCity('Goa')">
                        <circle class="city-node" id="node-Goa" cx="110" cy="290" r="6" />
                        <text class="city-label" x="125" y="295">Goa</text>
                    </g>
                </svg>
            </div>
        </div>

        <!-- Trending Events Cards -->
        <div class="fade-in-section mt-4 mb-4" style="margin-top:80px;">
            <div class="flex-between mb-3">
                <h2 class="section-heading-decorate">Epic Experiences</h2>
                <a href="events.html" class="text-muted transition-link"
                    style="text-transform:uppercase; font-size:0.9rem; letter-spacing:1px;">All Events</a>
            </div>
            <div id="events-grid" class="grid"></div>
        </div>

    </div>

    <div id="footer-container"></div>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.body.classList.remove('page-transitioning');

            const city = localStorage.getItem("selectedCity") || "Delhi";
            document.getElementById("current-city-label").innerText = city;

            // Highlight Active Map Node
            const activeNode = document.getElementById(`node-${city}`);
            if (activeNode) activeNode.classList.add('active');

            // Generate map quick links
            const cityListEl = document.getElementById('map-cities-list');
            cityListEl.innerHTML = cities.map(c =>
                `<button onclick="changeCity('${c}')" class="btn btn-outline" style="padding: 6px 12px; font-size: 0.8rem; border-color: ${c === city ? 'var(--primary-color)' : 'rgba(255,255,255,0.2)'}; color: ${c === city ? 'var(--primary-color)' : 'white'};">${c}</button>`
            ).join('');

            // Load Hero Banner
            const featured = movies.find(m => m.isFeatured) || movies[0];
            const heroHtml = `
                <div class="hero-banner" style="background: url('${featured.heroImage || featured.poster}') center/top/cover no-repeat;">
                    <div class="container hero-content">
                        <span style="color: var(--accent-color); text-transform:uppercase; font-weight:600; letter-spacing:2px; font-family:var(--font-heading); font-size:1.5rem;">Global Premiere</span>
                        <h1 class="hero-title">${featured.title}</h1>
                        <div class="hero-meta">
                            <span class="hero-tag" style="background: var(--accent-color); font-weight: 700;">★ ${featured.rating}</span>
                            <span class="hero-tag">${featured.genre}</span>
                            <span class="hero-tag">${featured.duration}</span>
                            <span class="hero-tag" style="border-style:solid; color:var(--text-main);">${featured.censor}</span>
                        </div>
                        <div class="hero-actions" style="display:flex; gap:15px; margin-top:20px;">
                            <a href="booking.html?id=${featured.id}&type=movie" class="btn btn-primary transition-link" style="padding: 15px 35px; font-size:1.1rem;">Book Tickets</a>
                            <button class="btn btn-outline" style="padding: 15px 35px;" onclick="openTrailer(event, '${featured.trailer}')">▶ Watch Trailer</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById("hero-banner-container").innerHTML = heroHtml;

            // Load Movies based on City into Carousel
            const cityMovies = movies.filter(m => m.city.includes(city));
            const carouselContainer = document.getElementById("movies-carousel");

            if (cityMovies.length > 0) {
                carouselContainer.innerHTML = cityMovies.map(m => generateCardHTML(m, 'movie')).join('');
            } else {
                carouselContainer.innerHTML = `<p class="text-muted" style="width:100%; text-align:center;">No popular movies listed in ${city} right now.</p>`;
            }

            // Load Events
            const eventsGrid = document.getElementById("events-grid");
            let allEvents = [...categories.events, ...categories.concerts, ...categories.sports];

            // Prioritize local events if any, else generic
            let displayEvents = allEvents.filter(e => e.location === city);
            if (displayEvents.length < 4) {
                displayEvents = [...displayEvents, ...allEvents.filter(e => e.location !== city)].slice(0, 4);
            }

            eventsGrid.innerHTML = displayEvents.map(e => generateCardHTML(e, 'event')).join('');
        });

        function scrollCarousel(id, offset) {
            document.getElementById(id).scrollBy({ left: offset, behavior: 'smooth' });
        }
    </script>
</body>

</html>
