<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Details - Movie Ticket System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .detail-hero {
            position: relative;
            padding: 120px 0 80px;
            min-height: 80vh;
            display: flex;
            align-items: center;
            overflow: hidden;
            margin-top: -100px;
        }

        #detail-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            filter: blur(5px) brightness(0.4);
            transform: scale(1.1);
        }

        .detail-hero::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to right, var(--bg-color) 10%, rgba(74, 92, 47, 0.9) 50%, rgba(59, 42, 26, 0.6) 100%),
                linear-gradient(to top, var(--bg-color) 0%, transparent 20%);
            z-index: 2;
        }

        .detail-content {
            position: relative;
            z-index: 3;
            display: flex;
            gap: 50px;
            align-items: flex-start;
        }

        .detail-poster {
            flex: 0 0 320px;
            border-radius: var(--radius-sm);
            background: rgba(245, 237, 214, 0.8);
            padding: 8px;
            border: 2px dashed var(--accent-color);
            box-shadow: 4px 4px 0px rgba(59, 42, 26, 0.2);
            animation: fadeUp 0.8s ease-out;
        }

        .detail-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .detail-info {
            flex: 1;
            animation: fadeUp 1s ease-out 0.2s both;
        }

        .meta-tags {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }

        .meta-tag {
            background: rgba(245, 237, 214, 0.8);
            padding: 5px 12px;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            border: 1px dashed var(--accent-color);
            color: var(--ink-brown);
            box-shadow: 2px 2px 0px rgba(59, 42, 26, 0.1);
        }

        .synopsis {
            font-size: 1.1rem;
            color: #ccc;
            margin-bottom: 30px;
            max-width: 800px;
            line-height: 1.8;
        }

        .cast-section h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .cast-grid {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            overflow-x: auto;
            padding-bottom: 10px;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .cast-grid::-webkit-scrollbar {
            display: none;
        }

        .cast-member {
            text-align: center;
            flex: 0 0 100px;
        }

        .cast-member img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
            border: 2px dashed var(--primary-color);
            box-shadow: 2px 2px 0px rgba(59, 42, 26, 0.2);
            transition: transform 0.3s;
        }

        .cast-member:hover img {
            transform: scale(1.1);
            border-color: var(--accent-color);
            box-shadow: 3px 3px 0px rgba(59, 42, 26, 0.3);
        }

        .cast-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .cast-role {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media(max-width: 900px) {
            .detail-content {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .detail-poster {
                flex: 0 0 250px;
                margin-bottom: 30px;
            }

            .meta-tags,
            .cast-grid {
                justify-content: center;
            }

            .detail-hero::after {
                background: linear-gradient(to top, var(--bg-color) 0%, rgba(28, 10, 0, 0.8) 100%);
            }

            .synopsis {
                text-align: left;
            }
        }
    </style>
</head>

<body class="page-transitioning">

    <div id="global-loader">
        <div class="spinner"></div>
    </div>
    <div id="navbar-container"></div>

    <div class="detail-hero" id="hero-container">
        <img src="" id="detail-bg" alt="bg">
        <div class="container detail-content">

            <div class="detail-poster">
                <img src="" id="detail-poster-img" alt="poster">
            </div>

            <div class="detail-info">
                <h1 id="detail-title" class="section-heading-decorate"
                    style="font-size: 4rem; margin-bottom:25px; padding-bottom:5px; color: var(--text-main);">Movie
                    Title</h1>

                <div class="meta-tags" id="detail-meta">
                    <span class="meta-tag"
                        style="background: var(--accent-color); color: var(--ink-brown); font-weight: bold; border:none; box-shadow: 2px 2px 0px rgba(59, 42, 26, 0.2);">IMDb
                        <span id="rating">9.0</span></span>
                    <span class="meta-tag" id="censor" style="border:1px dashed var(--primary-color);">U/A</span>
                    <span class="meta-tag" id="duration">2h 30m</span>
                    <span class="meta-tag" id="genre">Action, Drama</span>
                    <span class="meta-tag" id="release">15 Aug 2024</span>
                </div>

                <div class="synopsis" id="detail-synopsis">
                    Loading synopsis...
                </div>

                <div class="cast-section">
                    <h3 class="section-heading-decorate" style="margin-bottom: 25px;">Top Cast</h3>
                    <div class="cast-grid" id="cast-container">
                        <!-- JS injected -->
                    </div>
                </div>

                <div style="display:flex; gap:20px; align-items:center;">
                    <button class="btn btn-primary transition-link" id="btn-book"
                        style="padding: 15px 40px; font-size: 1.2rem; box-shadow: 0 10px 30px rgba(123, 47, 255, 0.4);">
                        Book Tickets
                    </button>
                    <button class="btn btn-outline" id="btn-trailer"
                        style="padding: 15px 30px; font-size: 1.1rem; border-color:var(--accent-color); color:var(--accent-color);">
                        ▶ Watch Trailer
                    </button>
                    <span class="text-muted ml-3" style="font-size:0.9rem;">Dir: <span id="director"
                            style="color:var(--text-main); font-weight:600;">Director Name</span></span>
                </div>

            </div>
        </div>
    </div>

    <div id="footer-container"></div>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const id = getUrlParameter('id');
            const movie = movies.find(m => m.id === id);

            if (!movie) {
                document.getElementById('detail-title').innerText = "Movie Not Found";
                return;
            }

            document.title = `${movie.title} - Movie Ticket System`;
            document.getElementById('detail-bg').src = movie.heroImage || movie.poster;
            document.getElementById('detail-poster-img').src = movie.poster;
            document.getElementById('detail-title').innerText = movie.title;

            document.getElementById('rating').innerText = movie.rating;
            document.getElementById('censor').innerText = movie.censor || 'U/A';
            document.getElementById('duration').innerText = movie.duration || '2h 15m';
            document.getElementById('genre').innerText = movie.genre;
            document.getElementById('release').innerText = movie.releaseDate || '2024';

            document.getElementById('detail-synopsis').innerText = movie.synopsis || "An epic cinematic journey awaits...";
            document.getElementById('director').innerText = movie.director || "Unknown";

            // Cast
            if (movie.cast && movie.cast.length > 0) {
                document.getElementById('cast-container').innerHTML = movie.cast.map(c => `
                    <div class="cast-member">
                        <img src="${c.image}" alt="${c.name}">
                        <div class="cast-name">${c.name}</div>
                        <div class="cast-role">${c.role}</div>
                    </div>
                `).join('');
            } else {
                document.getElementById('cast-container').innerHTML = '<p class="text-muted">Cast info unavailable.</p>';
            }

            // Buttons
            document.getElementById('btn-book').onclick = () => {
                document.body.classList.add('page-transitioning');
                setTimeout(() => window.location.href = `booking.html?id=${movie.id}&type=movie`, 400);
            };

            if (movie.trailer) {
                document.getElementById('btn-trailer').onclick = (e) => openTrailer(e, movie.trailer);
            } else {
                document.getElementById('btn-trailer').style.display = 'none';
            }

        });
    </script>
</body>

</html>
