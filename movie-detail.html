<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Details - Movie Ticket System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .detail-hero {
            position: relative;
            padding: 120px 0 80px;
            min-height: 80vh;
            display: flex;
            align-items: center;
            overflow: hidden;
            margin-top: -100px;
        }

        #detail-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            filter: blur(5px) brightness(0.4);
            transform: scale(1.1);
        }

        .detail-hero::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.85);
            /* Clean white overlay */
            z-index: 2;
        }

        .detail-content {
            position: relative;
            z-index: 3;
            display: flex;
            gap: 50px;
            align-items: flex-start;
        }

        .detail-poster {
            flex: 0 0 320px;
            animation: fadeUp 0.8s ease-out;
        }

        .detail-poster img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            object-fit: cover;
            display: block;
        }

        .detail-info {
            flex: 1;
            animation: fadeUp 1s ease-out 0.2s both;
        }

        .meta-tags {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }

        .meta-tag {
            background: #ffffff;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.9rem;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            font-weight: 500;
        }

        .synopsis {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            max-width: 800px;
            line-height: 1.8;
        }

        .cast-section h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            padding-bottom: 10px;
            color: var(--text-main);
        }

        .cast-grid {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            overflow-x: auto;
            padding-bottom: 10px;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .cast-grid::-webkit-scrollbar {
            display: none;
        }

        .cast-member {
            text-align: center;
            flex: 0 0 100px;
        }

        .cast-member img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
            border: 2px solid var(--primary-color);
            box-shadow: 0 4px 10px rgba(108, 53, 222, 0.15);
            transition: transform 0.3s;
        }

        .cast-member:hover img {
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(108, 53, 222, 0.25);
        }

        .cast-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .cast-role {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .detail-actions {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-top: 20px;
        }
        .detail-actions .btn-primary {
            padding: 15px 40px;
            font-size: 1.2rem;
            box-shadow: 0 10px 30px rgba(108, 53, 222, 0.3);
        }
        .detail-actions .btn-outline {
            padding: 15px 30px;
            font-size: 1.1rem;
        }
        .dir-text {
            font-size: 0.9rem;
            margin-left: 10px;
        }
        .dir-text span {
            color: var(--text-main);
            font-weight: 600;
        }

        @media(max-width: 900px) {
            .detail-content {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .detail-poster {
                flex: 0 0 250px;
                margin-bottom: 30px;
            }
            .meta-tags,
            .cast-grid {
                justify-content: center;
            }
            .synopsis {
                text-align: center;
            }
        }

        @media(max-width: 768px) {
            .detail-hero {
                padding-top: 80px;
            }
            #detail-title {
                font-size: 2.2rem !important;
                margin-bottom: 15px !important;
            }
            .meta-tags {
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
            }
            .meta-tag {
                font-size: 0.75rem;
                padding: 4px 10px;
            }
            .synopsis {
                font-size: 1rem;
            }
            .detail-actions {
                flex-direction: column;
                align-items: stretch;
                width: 100%;
                gap: 15px;
            }
            .detail-actions .btn {
                width: 100%;
                justify-content: center;
            }
            .dir-text {
                margin-left: 0;
                margin-top: 5px;
            }
        }
    </style>
</head>

<body class="page-transitioning">

    <div id="global-loader">
        <div class="spinner"></div>
    </div>
    <div id="navbar-container"></div>

    <div class="detail-hero" id="hero-container">
        <img src="" id="detail-bg" alt="bg">
        <div class="container detail-content">

            <div class="detail-poster">
                <img src="" id="detail-poster-img" alt="poster">
            </div>

            <div class="detail-info">
                <h1 id="detail-title"
                    style="font-size: 4rem; margin-bottom:25px; padding-bottom:5px; color: var(--text-main); font-weight: 700;">
                    Movie
                    Title</h1>

                <div class="meta-tags" id="detail-meta">
                    <span class="meta-tag"
                        style="background: var(--primary-color); color: #ffffff; font-weight: bold; border:none;">IMDb
                        <span id="rating">9.0</span></span>
                    <span class="meta-tag" id="censor">U/A</span>
                    <span class="meta-tag" id="duration">2h 30m</span>
                    <span class="meta-tag" id="genre">Action, Drama</span>
                    <span class="meta-tag" id="release">15 Aug 2024</span>
                </div>

                <div class="synopsis" id="detail-synopsis">
                    Loading synopsis...
                </div>

                <div class="cast-section">
                    <h3 style="margin-bottom: 25px; font-weight: 600;">Top Cast</h3>
                    <div class="cast-grid" id="cast-container">
                        <!-- JS injected -->
                    </div>
                </div>

                <div class="detail-actions">
                    <button class="btn btn-primary transition-link" id="btn-book">
                        Book Tickets
                    </button>
                    <button class="btn btn-outline" id="btn-trailer">
                        ▶ Watch Trailer
                    </button>
                    <span class="text-muted dir-text">Dir: <span id="director">Director Name</span></span>
                </div>

            </div>
        </div>
    </div>

    <div id="footer-container"></div>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const id = getUrlParameter('id');
            let movie = null;

            // Try fetching from backend API first
            try {
                const res = await fetch('http://localhost:5000/api/movies');
                const data = await res.json();
                const found = data.find(m => m.movie_id == id);
                if (found) {
                    movie = {
                        id: found.movie_id,
                        title: found.title,
                        genre: found.genre,
                        language: found.language,
                        rating: found.rating,
                        poster: found.poster_url,
                        heroImage: found.poster_url,
                        synopsis: found.synopsis,
                        trailer: found.trailer,
                        duration: found.duration || '2h 15m',
                        censor: found.censor || 'U/A',
                        releaseDate: found.release_date || '2024',
                        director: found.director || 'Unknown',
                        cast: JSON.parse(found.cast_data || '[]')
                    };
                }
            } catch (e) {
                console.error("API fetch failed, falling back to local data:", e);
            }

            // Fallback to local data.js for legacy IDs (e.g. 'm1')
            if (!movie && typeof movies !== 'undefined') {
                movie = movies.find(m => m.id === id);
            }

            if (!movie) {
                document.getElementById('detail-title').innerText = "Movie Not Found";
                return;
            }

            document.title = `${movie.title} - Movie Ticket System`;
            document.getElementById('detail-bg').src = movie.heroImage || movie.poster;
            document.getElementById('detail-poster-img').src = movie.poster;
            document.getElementById('detail-title').innerText = movie.title;

            document.getElementById('rating').innerText = movie.rating;
            document.getElementById('censor').innerText = movie.censor || 'U/A';
            document.getElementById('duration').innerText = movie.duration || '2h 15m';
            document.getElementById('genre').innerText = movie.genre;
            document.getElementById('release').innerText = movie.releaseDate || '2024';

            document.getElementById('detail-synopsis').innerText = movie.synopsis || "An epic cinematic journey awaits...";
            document.getElementById('director').innerText = movie.director || "Unknown";

            // Cast
            if (movie.cast && movie.cast.length > 0) {
                document.getElementById('cast-container').innerHTML = movie.cast.map(c => `
                    <div class="cast-member">
                        <img src="${c.image}" alt="${c.name}">
                        <div class="cast-name">${c.name}</div>
                        <div class="cast-role">${c.role}</div>
                    </div>
                `).join('');
            } else {
                document.getElementById('cast-container').innerHTML = '<p class="text-muted">Cast info unavailable.</p>';
            }

            // Buttons
            document.getElementById('btn-book').onclick = () => {
                document.body.classList.add('page-transitioning');
                const userCity = localStorage.getItem('selectedCity') || 'Delhi';
                setTimeout(() => window.location.href = `theatre-selection.html?id=${movie.id}&type=movie&city=${userCity}`, 400);
            };

            if (movie.trailer) {
                document.getElementById('btn-trailer').onclick = (e) => openTrailer(e, movie.trailer);
            } else {
                document.getElementById('btn-trailer').style.display = 'none';
            }

        });
    </script>
</body>

</html>
