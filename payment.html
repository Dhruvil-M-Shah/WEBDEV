<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Movie Ticket System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .payment-container {
            max-width: 600px;
            margin: 40px auto;
            background: rgba(245, 237, 214, 0.9);
            padding: 40px;
            border-radius: var(--radius-sm);
            border: 2px dashed var(--accent-color);
            box-shadow: 6px 6px 20px rgba(59, 42, 26, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: relative;
        }

        .form-control:focus {
            border-color: var(--primary-color) !important;
            box-shadow: 0 0 15px rgba(123, 47, 255, 0.5) !important;
        }

        .hidden {
            display: none !important;
        }

        .payment-methods {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .pay-method {
            flex: 1;
            padding: 15px;
            border: 2px dashed rgba(200, 169, 81, 0.4);
            border-radius: var(--radius-sm);
            cursor: pointer;
            text-align: center;
            transition: var(--transition-fast);
            color: var(--text-muted);
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .pay-method.active {
            border-style: solid;
            border-color: var(--primary-color);
            background: var(--primary-color);
            color: var(--bg-color);
            box-shadow: 3px 3px 0px var(--ink-brown);
        }

        /* Premium Ticket Design */
        .ticket {
            background: rgba(245, 237, 214, 0.95);
            backdrop-filter: blur(10px);
            color: var(--ink-brown);
            max-width: 450px;
            margin: 0 auto;
            border-radius: var(--radius-sm);
            position: relative;
            box-shadow: 8px 8px 30px rgba(59, 42, 26, 0.3);
            font-family: var(--font-body);
            border: 2px solid var(--ink-brown);
        }

        /* Cutout effects for ticket edges */
        .ticket::before,
        .ticket::after {
            content: '';
            position: absolute;
            top: 120px;
            width: 30px;
            height: 30px;
            background: var(--bg-color);
            border-radius: 50%;
            z-index: 2;
        }

        .ticket::before {
            left: -15px;
            border-right: 2px solid var(--ink-brown);
        }

        .ticket::after {
            right: -15px;
            border-left: 2px solid var(--ink-brown);
        }

        .ticket-header {
            background: var(--primary-color);
            color: var(--bg-color);
            padding: 25px;
            text-align: center;
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
            position: relative;
            border-bottom: 2px dashed var(--accent-color);
        }

        .ticket-body {
            padding: 35px 30px;
            border-bottom: 2px dashed var(--accent-color);
        }

        .ticket-footer {
            padding: 25px 30px;
            text-align: center;
            background: rgba(200, 169, 81, 0.2);
            border-radius: 0 0 var(--radius-sm) var(--radius-sm);
        }

        .ticket-barcode {
            width: 80%;
            height: 50px;
            margin: 10px auto;
            opacity: 0.7;
        }

        @media print {
            body * {
                visibility: hidden;
            }

            #confirmation-view,
            #confirmation-view * {
                visibility: visible;
            }

            #confirmation-view {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                margin: 0;
                padding: 20px;
            }

            .btn,
            #navbar-container {
                display: none !important;
            }

            .ticket::before,
            .ticket::after {
                background: white;
            }
        }
    </style>
</head>

<body class="page-transitioning">
    <div id="global-loader">
        <div class="spinner"></div>
    </div>
    <div id="navbar-container"></div>

    <div class="main-content container fade-in-section">

        <!-- PAYMENT VIEW -->
        <div id="payment-view" class="payment-container" style="backdrop-filter: blur(10px);">
            <div
                style="text-align:center; padding-bottom:30px; border-bottom: 1px solid rgba(74, 92, 47, 0.2); margin-bottom:30px;">
                <h2 class="section-heading-decorate"
                    style="font-size:2.5rem; letter-spacing:2px; margin:0; color: var(--ink-brown);">Secure Checkout
                </h2>
                <p class="text-muted"
                    style="text-transform:uppercase; font-size:0.85rem; letter-spacing:1px; margin-top:15px;">Complete
                    your booking</p>
            </div>

            <div class="price-total flex-between mb-4">
                <span class="text-muted"
                    style="font-family:var(--font-heading); font-size:1.5rem; letter-spacing:1px;">AMOUNT TO PAY</span>
                <span id="pay-amount"
                    style="font-size:3.5rem; font-family:var(--font-display); color:var(--primary-color); text-shadow: 2px 2px 0px var(--accent-color); line-height:1;">₹0</span>
            </div>

            <div class="payment-methods mt-4 mb-4">
                <div class="pay-method active" onclick="selectMethod(this, 'upi')">UPI</div>
                <div class="pay-method" onclick="selectMethod(this, 'card')">CREDIT / DEBIT CARD</div>
            </div>

            <div id="form-upi" class="mt-4" style="animation: fadeUp 0.4s ease-out;">
                <div class="form-group mb-3">
                    <label
                        style="font-weight:700; font-size:0.9rem; color:var(--ink-brown); display:block; margin-bottom:8px;">Virtual
                        Payment Address (UPI ID)</label>
                    <input type="text" class="form-control" placeholder="username@upi" required
                        style="width:100%; padding:15px; background:rgba(255,255,255,0.4); border:1px solid rgba(74, 92, 47, 0.4); color:var(--ink-brown); border-radius:var(--radius-sm); font-family:var(--font-body); outline:none; transition:border 0.3s; font-weight: 700;">
                </div>
            </div>

            <div id="form-card" class="mt-4 hidden" style="animation: fadeUp 0.4s ease-out;">
                <div class="form-group mb-3">
                    <label
                        style="font-weight:700; font-size:0.9rem; color:var(--ink-brown); display:block; margin-bottom:8px;">Card
                        Number</label>
                    <input type="text" class="form-control" placeholder="1234 5678 9101 1121"
                        style="width:100%; padding:15px; background:rgba(255,255,255,0.4); border:1px solid rgba(74, 92, 47, 0.4); color:var(--ink-brown); border-radius:var(--radius-sm); font-family:var(--font-body); outline:none; font-weight: 700;">
                </div>
                <div class="flex-between" style="gap:20px;">
                    <div class="form-group" style="width:100%;">
                        <label
                            style="font-weight:700; font-size:0.9rem; color:var(--ink-brown); display:block; margin-bottom:8px;">Expiry
                            Date</label>
                        <input type="text" class="form-control" placeholder="MM/YY"
                            style="width:100%; padding:15px; background:rgba(255,255,255,0.4); border:1px solid rgba(74, 92, 47, 0.4); color:var(--ink-brown); border-radius:var(--radius-sm); font-family:var(--font-body); outline:none; font-weight: 700;">
                    </div>
                    <div class="form-group" style="width:100%;">
                        <label
                            style="font-weight:700; font-size:0.9rem; color:var(--ink-brown); display:block; margin-bottom:8px;">CVV</label>
                        <input type="password" class="form-control" placeholder="***"
                            style="width:100%; padding:15px; background:rgba(255,255,255,0.4); border:1px solid rgba(74, 92, 47, 0.4); color:var(--ink-brown); border-radius:var(--radius-sm); font-family:var(--font-body); outline:none; font-weight: 700;">
                    </div>
                </div>
            </div>

            <button class="btn btn-primary btn-block mt-4" onclick="processPayment()"
                style="padding:18px; font-size:1.2rem; margin-top:30px;">PAY SECURELY</button>
        </div>

        <!-- CONFIRMATION VIEW -->
        <div id="confirmation-view" class="hidden" style="text-align:center; padding: 40px 0;">
            <div
                style="background: var(--bg-color); width:80px; height:80px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; border:4px double var(--primary-color); box-shadow: 4px 4px 0px var(--ink-brown);">
                <span class="animated-checkmark" style="color:var(--primary-color); font-size:2.5rem;">✓</span>
            </div>
            <h2 class="section-heading-decorate"
                style="color:var(--ink-brown); margin-bottom:15px; font-size:3rem; padding-bottom:5px; text-shadow: 2px 2px 0px var(--accent-color);">
                Payment Successful</h2>
            <p class="text-muted mb-4" style="text-transform:uppercase; letter-spacing:2px; font-size:1rem;">Your
                cinematic experience awaits.</p>

            <div class="ticket mt-4">
                <div class="ticket-header">
                    <h3 style="margin:0; letter-spacing:4px; font-size:2rem; font-family: var(--font-display);">
                        Movie Ticket System</h3>
                    <div style="font-size:1rem; font-family:var(--font-body); margin-top:5px; color:var(--surface-color); letter-spacing:1px;"
                        id="ticket-id">BK-ID: #XYZ123</div>
                </div>
                <div class="ticket-body" style="text-align:left;">
                    <div style="font-family:var(--font-heading); font-size:3rem; color:var(--ink-brown); line-height:1.1; margin-bottom:5px;"
                        id="ticket-title">Movie Title</div>
                    <p style="color:var(--text-muted); font-size:0.9rem; font-weight:700; text-transform:uppercase; letter-spacing:1px;"
                        id="ticket-meta">Genre | Language</p>

                    <div class="mt-4 flex-between"
                        style="background:rgba(255,255,255,0.4); padding:20px; border-radius:var(--radius-sm); margin-top:30px; border: 1px dashed rgba(74, 92, 47, 0.4);">
                        <div>
                            <div
                                style="font-size:0.8rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:5px; font-weight: 700;">
                                Date & Time</div>
                            <div style="font-weight:700; font-size:1.1rem; color:var(--ink-brown);" id="ticket-date">
                                Today</div>
                        </div>
                        <div style="text-align:right;">
                            <div
                                style="font-size:0.8rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:5px; font-weight: 700;">
                                Seats / Blocks</div>
                            <div style="font-weight:800; font-size:1.2rem; color:var(--primary-color);"
                                id="ticket-seats">R1C2</div>
                        </div>
                    </div>
                    <!-- F&B Display -->
                    <div id="ticket-food-container" style="display:none; text-align:center; margin-top:15px; background:rgba(200, 169, 81, 0.1); padding:10px; border-radius:var(--radius-sm); border: 1px dashed rgba(200, 169, 81, 0.4);">
                        <div style="font-size:0.75rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:5px; font-weight: 700;">Add-ons Included</div>
                        <div style="font-weight:700; font-size:0.95rem; color:var(--ink-brown);" id="ticket-food"></div>
                    </div>
                </div>
                <div class="ticket-footer">
                    <div class="ticket-barcode">
                    </div>
                    <div style="font-family:var(--font-heading); font-size:2rem; margin-top:15px; color:var(--ink-brown);"
                        id="ticket-amount">Total Paid: ₹0</div>
                </div>
            </div>

            <div class="mt-4" style="display:flex; gap:20px; justify-content:center; margin-top:40px;">
                <button class="btn btn-outline" onclick="window.print()"
                    style="padding:15px 30px; font-size:1.1rem;">Print Ticket</button>
                <a href="HOME PAGE.html" class="btn btn-primary" style="padding:15px 30px; font-size:1.1rem;">Return to
                    Home</a>
            </div>
        </div>

    </div>

    <!-- No footer on checkout flow -->

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        let bookingData = null;

        document.addEventListener("DOMContentLoaded", () => {
            const dataStr = localStorage.getItem("currentBooking");
            if (!dataStr) {
                window.location.href = "HOME PAGE.html";
                return;
            }
            bookingData = JSON.parse(dataStr);
            document.getElementById("pay-amount").innerText = `₹${bookingData.total}`;
        });

        function selectMethod(el, type) {
            document.querySelectorAll('.pay-method').forEach(m => m.classList.remove('active'));
            el.classList.add('active');

            if (type === 'upi') {
                document.getElementById('form-upi').classList.remove('hidden');
                document.getElementById('form-card').classList.add('hidden');
            } else {
                document.getElementById('form-upi').classList.add('hidden');
                document.getElementById('form-card').classList.remove('hidden');
            }
        }

        async function processPayment() {
    const btn = document.querySelector("#payment-view .btn-primary");
    btn.innerText = "Processing...";
    btn.disabled = true;

    const token = localStorage.getItem('token');
    if (!token) {
        alert("Please log in first.");
        window.location.href = "login.html";
        return;
    }

    const activeMethod = document.querySelector('.pay-method.active').innerText.includes('UPI') ? 'upi' : 'card';

    try {
        const res = await fetch('https://webdev-05o3.onrender.com/api/payments', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({
                booking_id: bookingData.booking_id,
                amount: bookingData.total,
                method: activeMethod
            })
        });

        const data = await res.json();

        if (res.ok) {
            bookingData.payment_id = data.payment_id;
            localStorage.setItem('currentBooking', JSON.stringify(bookingData));
            showConfirmation();
        } else {
            btn.innerText = "PAY SECURELY";
            btn.disabled = false;
            alert(data.message || "Payment failed. Try again.");
        }
    } catch (error) {
        console.log(error);
        btn.innerText = "PAY SECURELY";
        btn.disabled = false;
        alert("Cannot connect to server. Make sure backend is running.");
    }
}

        function showConfirmation() {
            document.getElementById("payment-view").classList.add("hidden");
            const confView = document.getElementById("confirmation-view");
            confView.classList.remove("hidden");

            // Add fade animation
            confView.classList.add("fade-in-section");
            setTimeout(() => confView.classList.add("is-visible"), 50);

            // Populate Ticket
            document.getElementById("ticket-id").innerText = `BK-ID: #${bookingData.booking_id || Math.floor(Math.random() * 9000000)}`;
            document.getElementById("ticket-title").innerText = bookingData.item.title;

            let meta = bookingData.item.genre ? bookingData.item.genre : bookingData.item.location;
            if (bookingData.item.language) meta += ` | ${bookingData.item.language}`;
            document.getElementById("ticket-meta").innerText = meta;

            document.getElementById("ticket-date").innerText = bookingData.date;
            document.getElementById("ticket-seats").innerText = bookingData.seats.join(", ");
            
            if (bookingData.foodStr && bookingData.foodStr.length > 0) {
                document.getElementById("ticket-food-container").style.display = "block";
                document.getElementById("ticket-food").innerText = "🍿 " + bookingData.foodStr;
            }

            document.getElementById("ticket-amount").innerText = `Total Paid: ₹${bookingData.total}`;

            triggerConfetti();
        }

        function triggerConfetti() {
            const duration = 3 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 9999, colors: ['#4A5C2F', '#C8A951', '#3B2A1A'] };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function () {
                const timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                const particleCount = 50 * (timeLeft / duration);
                if (window.confetti) {
                    confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                    confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
                }
            }, 250);
        }
    </script>
</body>

</html>
