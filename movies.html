<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies - Movie Ticket System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header {
            padding: 60px 0 40px;
            border-bottom: 1px solid rgba(123, 47, 255, 0.3);
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px;
            font-size: 1.05rem;
            font-family: var(--font-body);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            margin-bottom: 25px;
            transition: var(--transition-fast);
            background: #ffffff;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(108, 53, 222, 0.15);
        }

        .search-input::placeholder {
            color: #999999;
        }

        .genre-filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .genre-btn {
            background-color: #ffffff;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-fast);
            font-family: var(--font-body);
        }

        .genre-btn:hover {
            background-color: var(--surface-deep);
        }

        .genre-btn.active {
            background-color: var(--primary-color);
            color: #ffffff;
        }
    </style>
</head>

<body class="page-transitioning">
    <div id="global-loader">
        <div class="spinner"></div>
    </div>
    <div id="navbar-container"></div>
    <div class="main-content container fade-in-section">
        <div class="page-header">
            <h1 class="section-heading-decorate text-main" style="padding-bottom:10px;">All Movies in <span
                    id="current-city-label" class="text-main" style="color:white;"></span></h1>
            <p class="text-muted" style="font-size:1.1rem; max-width:600px;">Explore the latest cinematic masterpieces
                currently showing or coming soon to theaters near you.</p>
        </div>
        <div class="filters-container" style="max-width: 800px; margin: 0 auto 40px auto; padding: 0 20px;">
            <input type="text" id="movie-search" class="search-input" placeholder="Search movies..." />
            <div class="genre-filters" id="genre-filters">
                <button class="genre-btn active" data-genre="All">All</button>
                <button class="genre-btn" data-genre="Action">Action</button>
                <button class="genre-btn" data-genre="Drama">Drama</button>
                <button class="genre-btn" data-genre="Horror">Horror</button>
                <button class="genre-btn" data-genre="Sci-Fi">Sci-Fi</button>
                <button class="genre-btn" data-genre="Comedy">Comedy</button>
                <button class="genre-btn" data-genre="Thriller">Thriller</button>
            </div>
        </div>
        <div id="all-movies-grid" class="grid"></div>
    </div>
    <div id="footer-container"></div>
    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const city = localStorage.getItem("selectedCity") || "Delhi";
            document.getElementById("current-city-label").innerText = city;
            const grid = document.getElementById("all-movies-grid");
            const searchInput = document.getElementById("movie-search");
            const genreBtns = document.querySelectorAll(".genre-btn");
            let searchTimeout = null;

            const renderMovies = (data) => {
                const mapped = data.map(m => ({
                    id: m.movie_id,
                    title: m.title,
                    genre: m.genre,
                    language: m.language,
                    rating: m.rating,
                    poster: m.poster_url,
                    synopsis: m.synopsis,
                    trailer: m.trailer,
                    heroImage: m.hero_image,
                    censor: m.censor,
                    cast: JSON.parse(m.cast_data || '[]'),
                    isFeatured: m.is_featured
                }));

                if (mapped.length > 0) {
                    grid.innerHTML = mapped.map(m => generateCardHTML(m, 'movie')).join('');
                } else {
                    grid.innerHTML = `<p class="text-muted" style="text-align:center; width: 100%;">No movies found matching your criteria.</p>`;
                }
            };

            const fetchMovies = async (url) => {
                try {
                    grid.innerHTML = `<div class="spinner" style="margin: 40px auto;"></div>`;
                    const res = await fetch(url);
                    const data = await res.json();
                    renderMovies(data);
                } catch (error) {
                    console.log(error);
                    grid.innerHTML = `<p class="text-muted" style="text-align:center; width: 100%;">Could not load movies. Make sure backend is running.</p>`;
                }
            };

            // Navbar Search Event Intercept
            document.addEventListener('navSearch', (e) => {
                const query = e.detail.query;
                searchInput.value = query; // Sync up local input if needed
                genreBtns.forEach(btn => btn.classList.remove('active'));
                document.querySelector('.genre-btn[data-genre="All"]').classList.add('active');

                if (query.length > 0) {
                    fetchMovies(`https://webdev-05o3.onrender.com/api/movies/search?q=${encodeURIComponent(query)}`);
                } else {
                    fetchMovies("https://webdev-05o3.onrender.com/api/movies");
                }
            });

            // Initialize based on URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const searchParam = urlParams.get('search');
            if (searchParam) {
                searchInput.value = searchParam;
                fetchMovies(`https://webdev-05o3.onrender.com/api/movies/search?q=${encodeURIComponent(searchParam)}`);
                // Clean URL visually (optional): history.replaceState(null, '', 'movies.html');
            } else {
                // Initial fetch if no search params
                fetchMovies("https://webdev-05o3.onrender.com/api/movies");
            }

            // Search Input Logic
            searchInput.addEventListener("input", (e) => {
                clearTimeout(searchTimeout);

                // Revert active button to 'All'
                genreBtns.forEach(btn => btn.classList.remove('active'));
                document.querySelector('.genre-btn[data-genre="All"]').classList.add('active');

                const query = e.target.value.trim();
                searchTimeout = setTimeout(() => {
                    if (query.length > 0) {
                        fetchMovies(`https://webdev-05o3.onrender.com/api/movies/search?q=${encodeURIComponent(query)}`);
                    } else {
                        fetchMovies("https://webdev-05o3.onrender.com/api/movies");
                    }
                }, 300);
            });

            // Genre Filter Logic
            genreBtns.forEach(btn => {
                btn.addEventListener("click", () => {
                    // Ignore if currently active
                    if (btn.classList.contains('active')) return;

                    // Reset styling
                    genreBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    // Reset search
                    searchInput.value = '';

                    const genre = btn.getAttribute('data-genre');
                    if (genre === 'All') {
                        fetchMovies("https://webdev-05o3.onrender.com/api/movies");
                    } else {
                        fetchMovies(`https://webdev-05o3.onrender.com/api/movies/filter?genre=${encodeURIComponent(genre)}`);
                    }
                });
            });

        });
    </script>
</body>

</html>
