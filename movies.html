<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies - Movie Ticket System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header {
            padding: 60px 0 40px;
            border-bottom: 1px solid rgba(123, 47, 255, 0.3);
            margin-bottom: 40px;
        }
    </style>
</head>

<body class="page-transitioning">
    <div id="global-loader">
        <div class="spinner"></div>
    </div>
    <div id="navbar-container"></div>
    <div class="main-content container fade-in-section">
        <div class="page-header">
            <h1 class="section-heading-decorate text-main" style="padding-bottom:10px;">All Movies in <span
                    id="current-city-label" class="text-main" style="color:white;"></span></h1>
            <p class="text-muted" style="font-size:1.1rem; max-width:600px;">Explore the latest cinematic masterpieces
                currently showing or coming soon to theaters near you.</p>
        </div>
        <div id="all-movies-grid" class="grid"></div>
    </div>
    <div id="footer-container"></div>
    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const city = localStorage.getItem("selectedCity") || "Delhi";
            document.getElementById("current-city-label").innerText = city;
            const cityMovies = movies.filter(m => m.city.includes(city));
            const grid = document.getElementById("all-movies-grid");
            if (cityMovies.length > 0) {
                grid.innerHTML = cityMovies.map(m => generateCardHTML(m, 'movie')).join('');
            } else {
                grid.innerHTML = `<p class="text-muted">No movies available in ${city}.</p>`;
            }
        });
    </script>
</body>

</html>
