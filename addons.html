<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add-ons & Food - Movie Ticket System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .food-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .food-card {
            background: #ffffff;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .food-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border-color: var(--primary-light);
        }

        .food-img {
            height: 160px;
            background: var(--bg-color);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        .food-info h4 {
            font-family: var(--font-heading);
            font-size: 1.1rem;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        .food-info p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .food-price {
            font-weight: 600;
            color: var(--primary-color);
            font-size: 1.2rem;
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: auto;
        }

        .qty-btn {
            background: var(--primary-light);
            color: var(--primary-dark);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .qty-btn:hover {
            background: var(--primary-color);
            color: #ffffff;
        }

        .qty-val {
            font-weight: 600;
            width: 20px;
            text-align: center;
        }

        .addons-layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 30px;
            align-items: start;
        }

        @media (max-width: 992px) {
            .addons-layout {
                grid-template-columns: 1fr;
            }
        }

        .cart-section {
            background: #ffffff;
            border-radius: var(--radius-lg);
            padding: 30px;
            border: 1px solid var(--border-color);
            position: sticky;
            top: 100px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .cart-category {
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary-color);
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px dashed var(--border-color);
            margin-top: 20px;
        }
    </style>
</head>

<body class="page-transitioning">

    <div id="global-loader">
        <div class="spinner"></div>
    </div>
    <div id="navbar-container"></div>

    <div class="main-content container fade-in-section">

        <div class="addons-layout">
            <!-- Left Side: Food Selection -->
            <div>
                <div class="flex-between mb-2 mt-4">
                    <div>
                        <h2 style="margin-bottom:0;">Grab a Bite!</h2>
                        <p class="text-muted" style="font-size:0.95rem; margin-top:5px;">Pre-book your F&B and skip the queue</p>
                    </div>
                    <a href="#" onclick="skipFood()" style="color:var(--text-muted); font-weight:600; font-size:0.9rem;">Skip ➔</a>
                </div>

                <div class="food-grid" id="food-grid">
                    <!-- Javascript injected food items -->
                </div>
            </div>

            <!-- Right Side: Unified Cart -->
            <div class="cart-section">
                <h3 style="padding-bottom:15px; margin-bottom:10px; color: var(--text-main); font-family:var(--font-heading);">
                    Booking Summary</h3>

                <div class="movie-mini-info" id="movie-info-container" style="display:flex; gap:15px; margin-bottom:20px;">
                    <!-- Injected by script -->
                </div>

                <!-- Tickets Summary -->
                <div class="cart-category">🎟️ Tickets</div>
                <div id="ticket-summary"></div>

                <!-- F&B Summary -->
                <div class="cart-category" style="display:none;" id="fb-header">🍿 Food & Beverage</div>
                <div id="fb-summary"></div>

                <div id="cart-breakdown" style="border-top: 1px dashed var(--border-color); padding-top: 15px; margin-top: 20px;">
                    <!-- Javascript injected breakdown -->
                </div>

                <div class="price-total flex-between mt-4" style="border-top: 1px solid var(--border-color); padding-top:20px; align-items:flex-end;">
                    <span style="font-size:1rem; color:var(--text-muted); padding-bottom:5px;">Total</span>
                    <span id="total-price" style="font-size:2.5rem; line-height:1; color: var(--primary-color); font-family: var(--font-display);">₹0</span>
                </div>

                <button class="btn btn-primary btn-block mt-4" id="proceed-btn" style="padding: 18px; font-size:1.1rem; letter-spacing:0.5px; font-family: var(--font-body);">Proceed to Payment</button>
            </div>
        </div>

    </div>

    <div id="footer-container"></div>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        const pendingCheckout = JSON.parse(localStorage.getItem('pendingCheckout'));
        
        if (!pendingCheckout) {
            window.location.href = "index.html";
        }

        let foodItemsDB = [];
        let foodCart = {}; // { id: qty }

        document.addEventListener('DOMContentLoaded', async () => {
            renderHeaderInfo();
            try {
                const res = await fetch('https://webdev-05o3.onrender.com/api/food');
                if (!res.ok) throw new Error("API not ok");
                const data = await res.json();
                if (Array.isArray(data) && data.length > 0) {
                    foodItemsDB = data.map(i => ({ ...i, desc: i.desc_text || i.desc || '' }));
                } else {
                    throw new Error("Invalid or empty payload");
                }
            } catch (err) {
                console.warn("Falling back to local cache:", err);
                foodItemsDB = [
                    { id: 'f1', name: 'Large Popcorn + 2 Cokes', desc: 'Salted popcorn with 2 regular fountain drinks', price: 450, icon: '🍿' },
                    { id: 'f2', name: 'Nachos Combo', desc: 'Crispy nachos with jalapeños and cheese dip', price: 350, icon: '🧀' },
                    { id: 'f3', name: 'Regular Popcorn', desc: 'Classic salted popcorn', price: 250, icon: '🍿' },
                    { id: 'f4', name: 'Caramel Popcorn', desc: 'Sweet and crunchy caramel coated popcorn', price: 280, icon: '🍿' }
                ];
            }
            renderFoodGrid();
            updateUnifiedCart();
        });

        function renderHeaderInfo() {
            const { item, theatre, city, date, time } = pendingCheckout;
            const thBrand = theatre.split(':')[0].trim();
            const thSub = theatre.split(':')[1] ? theatre.split(':').slice(1).join(':').trim() : city;
            
            document.getElementById('movie-info-container').innerHTML = `
                <img src="${item.poster}" style="width: 70px; height: 100px; object-fit: cover; border-radius: 6px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);">
                <div style="display:flex; flex-direction:column; justify-content:center;">
                    <div style="font-family:var(--font-heading); font-size:1.1rem; line-height:1.2; margin-bottom:5px; font-weight:600;">${item.title}</div>
                    <div style="font-size:0.75rem; color:var(--text-muted); margin-bottom:3px;">
                        ${date} • ${time}
                    </div>
                    <span class="text-main" style="font-size:0.8rem; font-weight:600;">${thBrand}</span>
                </div>
            `;

            // Render Ticket Summary statically
            const ts = document.getElementById('ticket-summary');
            ts.innerHTML = `
                <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.9rem;">
                    <span>${pendingCheckout.seats}</span>
                    <span style="font-weight:600;">₹${pendingCheckout.seatSubtotal}</span>
                </div>
            `;
        }

        function renderFoodGrid() {
            const grid = document.getElementById('food-grid');
            grid.innerHTML = foodItemsDB.map(f => `
                <div class="food-card">
                    <div class="food-img">${f.icon}</div>
                    <div class="food-info">
                        <h4>${f.name}</h4>
                        <p>${f.desc}</p>
                        <div class="flex-between" style="align-items:center;">
                            <div class="food-price">₹${f.price}</div>
                            <div class="qty-control">
                                <button class="qty-btn" onclick="updateQty('${f.id}', -1)">-</button>
                                <span class="qty-val" id="qty-${f.id}">0</span>
                                <button class="qty-btn" onclick="updateQty('${f.id}', 1)">+</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateQty(id, change) {
            if (!foodCart[id]) foodCart[id] = 0;
            foodCart[id] += change;
            if (foodCart[id] < 0) foodCart[id] = 0;
            
            document.getElementById(`qty-${id}`).innerText = foodCart[id];
            updateUnifiedCart();
        }

        function updateUnifiedCart() {
            const fSum = document.getElementById('fb-summary');
            const fHead = document.getElementById('fb-header');
            
            fSum.innerHTML = '';
            let fSubtotal = 0;
            const foodArr = [];

            foodItemsDB.forEach(f => {
                const qty = foodCart[f.id];
                if (qty > 0) {
                    fSubtotal += f.price * qty;
                    foodArr.push({ name: f.name, qty: qty });
                    fSum.innerHTML += `
                        <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.9rem; color:var(--text-main);">
                            <span>${f.name} (x${qty})</span>
                            <span style="font-weight:600;">₹${f.price * qty}</span>
                        </div>
                    `;
                }
            });

            if (fSubtotal > 0) {
                fHead.style.display = 'block';
            } else {
                fHead.style.display = 'none';
            }

            const totalGst = pendingCheckout.seatGst; // we don't recalculate GST for food to match BookMyShow simplifications, or we add 5% for food. Let's just keep seat GST and add Food total cleanly.
            const finalTotal = pendingCheckout.seatSubtotal + pendingCheckout.convFee + pendingCheckout.seatGst + fSubtotal;

            document.getElementById('cart-breakdown').innerHTML = `
                <div style="display:flex; justify-content:space-between; margin-bottom:8px; color:var(--text-muted); font-size:0.85rem;">
                    <span>Ticket Subtotal</span>
                    <span>₹${pendingCheckout.seatSubtotal}</span>
                </div>
                ${fSubtotal > 0 ? `
                <div style="display:flex; justify-content:space-between; margin-bottom:8px; color:var(--text-muted); font-size:0.85rem;">
                    <span>F&B Subtotal</span>
                    <span>₹${fSubtotal}</span>
                </div>
                ` : ''}
                <div style="display:flex; justify-content:space-between; margin-bottom:8px; color:var(--text-muted); font-size:0.85rem;">
                    <span>Convenience Fee</span>
                    <span>₹${pendingCheckout.convFee}</span>
                </div>
                <div style="display:flex; justify-content:space-between; margin-bottom:8px; color:var(--text-main); font-weight:600; font-size:0.85rem;">
                    <span>GST (18%)</span>
                    <span>₹${pendingCheckout.seatGst}</span>
                </div>
            `;

            // Animate
            const tEl = document.getElementById('total-price');
            tEl.style.transform = 'scale(1.2)';
            setTimeout(() => tEl.style.transform = 'scale(1)', 150);
            tEl.innerText = `₹${finalTotal}`;
        }

        async function skipFood() {
            // zero out cart
            foodCart = {};
            updateUnifiedCart();
            await executeBooking();
        }

        document.getElementById('proceed-btn').addEventListener('click', executeBooking);

        async function executeBooking() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = "login.html";
                return;
            }

            const btn = document.getElementById('proceed-btn');
            const ogText = btn.innerText;
            btn.innerText = "Securing Booking...";
            btn.disabled = true;

            // Generate Food String
            const foodArr = [];
            let fSubtotal = 0;
            foodItemsDB.forEach(f => {
                if (foodCart[f.id]) {
                    foodArr.push(`${foodCart[f.id]}x ${f.name}`);
                    fSubtotal += f.price * foodCart[f.id];
                }
            });
            const foodString = foodArr.join(', ');
            const finalTotal = pendingCheckout.seatTotal + fSubtotal;

            try {
                const res = await fetch('https://webdev-05o3.onrender.com/api/bookings', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        movie_id: pendingCheckout.movie_id,
                        seats: pendingCheckout.seats,
                        total_price: finalTotal,
                        city: pendingCheckout.city,
                        theatre_name: pendingCheckout.theatre,
                        show_date: pendingCheckout.apiDate,
                        show_time: pendingCheckout.time,
                        food_items: foodString
                    })
                });

                const data = await res.json();
                if (res.ok) {
                    const finalBookingData = {
                        item: pendingCheckout.item,
                        seats: pendingCheckout.seatNames,
                        total: finalTotal,
                        foodStr: foodString,
                        date: pendingCheckout.date,
                        time: pendingCheckout.time,
                        theatre: pendingCheckout.theatre,
                        booking_id: data.booking_id
                    };
                    localStorage.setItem("currentBooking", JSON.stringify(finalBookingData));
                    
                    // clear pending
                    localStorage.removeItem("pendingCheckout");

                    document.body.classList.add('page-transitioning');
                    setTimeout(() => window.location.href = "payment.html", 400);
                } else {
                    btn.innerText = ogText;
                    btn.disabled = false;
                    alert(data.message || "Booking failed. Try again.");
                }
            } catch (error) {
                console.log(error);
                btn.innerText = ogText;
                btn.disabled = false;
                alert("Cannot connect to server.");
            }
        }
    </script>
</body>
</html>
