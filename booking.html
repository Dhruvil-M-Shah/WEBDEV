<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Tickets - Movie Ticket System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Vintage Theatre Seating Styles */
        .seat {
            background: #f3eeff !important;
            border-color: #eeeeee !important;
            transition: all 0.3s ease;
            position: relative;
        }

        .seat:hover:not(.booked) {
            background-color: var(--primary-hover) !important;
            border-color: var(--primary-color) !important;
            transform: translateY(-2px);
        }

        .seat.selected {
            background-color: var(--primary-color) !important;
            border-color: var(--primary-color) !important;
            color: #ffffff;
        }

        .seat.booked {
            background-color: #e74c3c !important;
            border-color: #c0392b !important;
            opacity: 0.8;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Legend */
        .legend-box {
            background: #f3eeff !important;
            border: 1px solid #eeeeee;
        }

        /* Specific Tier Colors */
        .seat.premium:not(.selected):not(.booked),
        .legend-box.premium {
            background: #e6dcff !important;
            border-color: var(--primary-color) !important;
        }

        .seat.recliner:not(.selected):not(.booked),
        .legend-box.recliner {
            background: #d4c4f9 !important;
            border-color: var(--primary-color) !important;
        }

        /* Booking Summary Card */
        .booking-summary {
            background: #ffffff;
            border-radius: var(--radius-lg);
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            position: relative;
        }



        /* Perspective Screen Glow */
        .screen {
            background: var(--primary-color) !important;
            box-shadow: 0 -15px 40px rgba(74, 92, 47, 0.4) !important;
            border-top: 3px double var(--accent-color) !important;
            border-radius: 2px 2px 0 0;
            transform: perspective(500px) rotateX(-15deg);
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-heading);
            color: var(--bg-color);
            letter-spacing: 12px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .screen::after {
            content: 'SCREEN';
        }

        /* Stadium / Concert Blocks */
        .seat-block {
            background: rgba(245, 237, 214, 0.6) !important;
            border: 2px dashed var(--accent-color) !important;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            color: var(--ink-brown);
        }

        .seat-block:hover,
        .seat-block.active {
            background: var(--primary-color) !important;
            color: var(--bg-color) !important;
            box-shadow: 3px 3px 0px var(--ink-brown) !important;
            border-color: var(--bg-color) !important;
            transform: translateY(-2px);
        }
    </style>
</head>

<body class="page-transitioning">

    <div id="global-loader">
        <div class="spinner"></div>
    </div>
    <div id="navbar-container"></div>

    <div class="main-content container fade-in-section">

        <div class="flex-between mb-4 mt-4">
            <div>
                <h2 id="page-title" style="margin-bottom:0;">Select Venue Layout</h2>
                <p class="text-muted" id="page-subtitle" style="font-size:0.95rem; margin-top:5px;">Choose your
                    experience</p>
            </div>
            <div id="movie-info-header" style="text-align:right;">
                <!-- Injected via JS -->
            </div>
        </div>

        <div class="booking-section">

            <div class="seat-map-container" id="venue-renderer">
                <!-- Javascript will inject the explicit layout here -->
            </div>

            <div class="booking-summary">
                <h3 style="padding-bottom:15px; margin-bottom:20px; color: var(--text-main);">
                    Your Cart</h3>

                <div class="movie-mini-info" id="movie-info-container"
                    style="display:flex; gap:15px; margin-bottom:30px;">
                    <!-- Injected by script -->
                </div>

                <div class="selection-list" id="cart-items" style="color: var(--text-main); max-height: 220px; overflow-y: auto; padding-right: 5px;">
                    <!-- Javascript injected rows: item x qty = price -->
                </div>

                <div id="cart-breakdown">
                    <!-- Javascript injected breakdown -->
                </div>

                <div class="price-total flex-between mt-4"
                    style="border-top: 1px solid var(--border-color); padding-top:20px; align-items:flex-end;">
                    <span style="font-size:1rem; color:var(--text-muted); padding-bottom:5px;">Total</span>
                    <span id="total-price"
                        style="font-size:2.5rem; line-height:1; color: var(--primary-color); font-family: var(--font-display);">₹0</span>
                </div>

                <button class="btn btn-primary btn-block mt-4" id="proceed-btn" disabled
                    style="padding: 18px; font-size:1.1rem; letter-spacing:0.5px; font-family: var(--font-body);">Checkout</button>
            </div>

        </div>

    </div>

    <div id="footer-container"></div>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        let currentItem = null;
        let cart = []; // Array of objects { id, name, price }
        let basePricing = { "Recliner": 500, "Premium": 350, "Classic": 200 };

        // Global variables for booking location state
        let currentCity, currentTheatre, currentShowDate, currentShowTime, currentDisplayDate;

        document.addEventListener("DOMContentLoaded", async () => {
            const id = getUrlParameter('id');
            const type = getUrlParameter('type') || 'movie';

            // New Location tracking safely decoded
            currentCity = (getUrlParameter('city').replace(/\+/g, ' ')) || localStorage.getItem('selectedCity') || 'Delhi';
            currentTheatre = (getUrlParameter('theatre').replace(/\+/g, ' ').replace(/%3A/g, ':').replace(/%2C/g, ',')) || 'Generic Cinema';
            currentShowDate = (getUrlParameter('date').replace(/\+/g, ' ')) || new Date().toISOString().split('T')[0];
            currentShowTime = (getUrlParameter('time').replace(/\+/g, ' ').replace(/%3A/g, ':')) || '10:00 AM';

            // Find item
            if (type === 'movie') {
                try {
                    const res = await fetch(`https://webdev-05o3.onrender.com/api/movies`);
                    const data = await res.json();

                    let found = data.find(m => m.movie_id == id);

                    if (!found && typeof movies !== 'undefined') {
                        const localMovie = movies.find(m => m.id === id);
                        if (localMovie) found = data.find(m => m.title === localMovie.title);
                    }

                    if (found) {
                        currentItem = {
                            id: found.movie_id,
                            title: found.title,
                            genre: found.genre,
                            language: found.language,
                            rating: found.rating,
                            poster: found.poster_url,
                            synopsis: found.synopsis,
                            trailer: found.trailer,
                            cast: JSON.parse(found.cast_data || '[]'),
                            venueType: 'multiplex'
                        };
                    }
                } catch (e) {
                    console.warn("Backend not running, using local data.js fallback");
                }
                
                // Local data fallback if backend failed or item not found in DB
                if (!currentItem && typeof movies !== 'undefined') {
                    const localFallback = movies.find(m => String(m.id) === String(id));
                    if (localFallback) {
                        currentItem = {
                            id: localFallback.id,
                            title: localFallback.title,
                            genre: localFallback.genre,
                            poster: localFallback.poster || localFallback.image,
                            venueType: 'multiplex'
                        };
                    }
                }
            }

            if (!currentItem) {
                document.getElementById('page-title').innerText = "Item Not Found";
                document.querySelector('.booking-summary').style.display = 'none';
                return;
            }

            // Sync tiers if specified
            if (currentItem.tiers) basePricing = currentItem.tiers;

            const thParts = currentTheatre.split(':');
            const thBrand = thParts[0].trim();
            const thSub = thParts[1] ? thParts.slice(1).join(':').trim() : currentCity;

            // Render Header Info
            document.getElementById('movie-info-header').innerHTML = `
                <h3 style="color:var(--text-main); margin-bottom:0; font-family: var(--font-heading);">${currentItem.title}</h3>
                <span class="text-muted" style="font-size:0.9rem;">${thBrand} • ${thSub} • ${currentCity}</span>
            `;

            currentDisplayDate = new Date(currentShowDate).toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });

            document.getElementById('movie-info-container').innerHTML = `
                <img src="${currentItem.poster}" style="width: 90px; height: 125px; object-fit: cover; border-radius: 6px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);">
                <div style="display:flex; flex-direction:column; justify-content:center;">
                    <div style="font-family:var(--font-heading); font-size:1.4rem; line-height:1.2; margin-bottom:5px;">${currentItem.title}</div>
                    <div style="font-size:0.75rem; color:var(--primary-color); margin-top:2px; margin-bottom:6px; text-transform:uppercase; font-weight:700; background:#f4f0ff; padding:4px 8px; display:inline-block; border-radius:4px; align-self:flex-start;">
                        ${currentDisplayDate} • ${currentShowTime}
                    </div>
                    <span class="text-main" style="font-size:0.9rem; font-weight:600; display:flex; align-items:center; gap:5px;"><span style="color:#e74c3c; font-size:0.8rem;">❤</span> ${thBrand}</span>
                    <span class="text-muted" style="font-size:0.8rem; margin-top:2px; margin-left:18px;">${thSub}</span>
                </div>
            `;

            renderVenueLayout();
            updateCartUI();

            // Small delay to ensure DOM is ready
            await new Promise(resolve => setTimeout(resolve, 200));

            // Fetch and Map Booked Seats
            if (type === 'movie') {
                try {
                    const seatsRes = await fetch(`https://webdev-05o3.onrender.com/api/seats/${id}`);
                    if (seatsRes.ok) {
                        const bookedSeatsArray = await seatsRes.json();

                        // Populate dummy bookings visually if none exist natively yet
                        if (bookedSeatsArray.length === 0) {
                            bookedSeatsArray.push(
                                'REC-R1C3', 'REC-R1C4',
                                'PRM-R2C5', 'PRM-R2C6', 'PRM-R2C7',
                                'PRM-R3C2', 'PRM-R3C3',
                                'CLS-R1C10', 'CLS-R1C11', 'CLS-R3C5'
                            );
                        }

                        document.querySelectorAll('.seat').forEach(seat => {
                            const dataId = seat.getAttribute('data-id');
                            if (bookedSeatsArray.some(label => label === dataId || label.startsWith(dataId + ' '))) {
                                seat.classList.add('booked');
                                seat.style.pointerEvents = 'none';
                                seat.style.backgroundColor = '#e74c3c'; // Reinstate red hue
                            }
                        });
                    }
                } catch (e) {
                    console.error("Failed to fetch booked seats:", e);
                }
            }
        });
        // ------------------------------------
        // LAYOUT ENGINES
        // ------------------------------------

        function renderVenueLayout() {
            const renderer = document.getElementById("venue-renderer");
            const type = currentItem.venueType || 'multiplex';

            if (type === 'multiplex') {
                renderer.innerHTML = `
                    <div class="screen"></div>
                    <div id="seat-map" style="margin-top:40px;">${generateMultiplexHTML()}</div>
                    <div class="seat-legend">
                        <div class="legend-item"><div class="legend-box available"></div> Classic (₹200)</div>
                        <div class="legend-item"><div class="legend-box premium available"></div> Premium (₹350)</div>
                        <div class="legend-item"><div class="legend-box recliner available" style="width:40px;"></div> Recliner (₹500)</div>
                    </div>
                `;
                bindMultiplexEvents();
            } else if (type.includes('stadium')) {
                renderer.innerHTML = generateStadiumHTML();
                bindBlockEvents();
            } else if (type === 'concert') {
                renderer.innerHTML = generateConcertHTML();
                bindBlockEvents();
            }
        }

        function generateMultiplexHTML() {
            let html = '';

            // Recliners
            html += `<div class="tier-label">Recliners - ₹500</div>`;
            for (let r = 0; r < 2; r++) {
                html += `<div class="seat-row">`;
                for (let c = 0; c < 8; c++) {
                    if (c === 4) html += `<div style="width:20px;"></div>`;
                    const seatId = `REC-R${r + 1}C${c + 1}`;
                    const isBooked = '';
                    html += `<div class="seat recliner ${isBooked}" data-id="${seatId}" data-tier="Recliner" data-price="500"></div>`;
                }
                html += `</div>`;
            }

            // Premium
            html += `<div class="tier-label">Premium - ₹350</div>`;
            for (let r = 0; r < 4; r++) {
                html += `<div class="seat-row">`;
                for (let c = 0; c < 12; c++) {
                    if (c === 6) html += `<div style="width:20px;"></div>`;
                    const seatId = `PRM-R${r + 1}C${c + 1}`;
                    const isBooked = '';
                    html += `<div class="seat premium ${isBooked}" data-id="${seatId}" data-tier="Premium" data-price="350"></div>`;
                }
                html += `</div>`;
            }

            // Classic
            html += `<div class="tier-label">Classic - ₹200</div>`;
            for (let r = 0; r < 4; r++) {
                html += `<div class="seat-row">`;
                for (let c = 0; c < 14; c++) {
                    if (c === 7) html += `<div style="width:20px;"></div>`;
                    const seatId = `CLS-R${r + 1}C${c + 1}`;
                    const isBooked = '';
                    html += `<div class="seat ${isBooked}" data-id="${seatId}" data-tier="Classic" data-price="200"></div>`;
                }
                html += `</div>`;
            }
            return html;
        }

        function bindMultiplexEvents() {
            document.querySelectorAll('.seat:not(.booked)').forEach(seat => {
                seat.addEventListener('click', (e) => {
                    const el = e.target;
                    const id = el.getAttribute('data-id');
                    const tier = el.getAttribute('data-tier');
                    const price = parseInt(el.getAttribute('data-price'));

                    if (el.classList.contains('selected')) {
                        el.classList.remove('selected');
                        cart = cart.filter(s => s.id !== id);
                    } else {
                        el.classList.add('selected');
                        cart.push({ id: id, name: `${id} (${tier})`, price: price });
                    }
                    updateCartUI();
                });
            });
        }

        function generateStadiumHTML() {
            const tKeys = Object.keys(basePricing);
            const getT = (idx) => tKeys[idx] || 'General';
            const getP = (idx) => basePricing[getT(idx)] || 800;

            return `
                <p class="text-muted mb-4 style="font-size:0.9rem;">Click a stand area to add tickets to your cart.</p>
                <div class="stadium-layout">
                    <div class="stadium-pitch"></div>
                    <div class="stadium-stand stand-north seat-block" data-name="${getT(0)} North" data-price="${getP(0)}">${getT(0)}<br>₹${getP(0)}</div>
                    <div class="stadium-stand stand-south seat-block" data-name="${getT(1)} South" data-price="${getP(1)}">${getT(1)}<br>₹${getP(1)}</div>
                    <div class="stadium-stand stand-east seat-block" data-name="${getT(2)} East Block" data-price="${getP(2)}">${getT(2)}<br>₹${getP(2)}</div>
                    <div class="stadium-stand stand-west seat-block" data-name="${getT(3) || 'VIP'} Pavilion" data-price="${getP(3) || 5000}">${getT(3) || 'VIP'}<br>₹${getP(3) || 5000}</div>
                </div>
            `;
        }

        function generateConcertHTML() {
            const tKeys = Object.keys(basePricing);
            const getT = (idx) => tKeys[idx] || 'General';
            const getP = (idx) => basePricing[getT(idx)] || 1500;

            return `
                <p class="text-muted mb-4 style="font-size:0.9rem;">Click a zone to add tickets to your cart.</p>
                <div class="concert-layout">
                    <div class="stage">STAGE</div>
                    <div class="pit-area seat-block" data-name="${getT(0)} Pit" data-price="${getP(0)}">
                        <div>
                            <span style="font-weight:bold; font-size:1.2rem; color:var(--primary-color);">${getT(0)} Standing</span><br>
                            <span style="font-size:0.9rem; color:white;">₹${getP(0)}</span>
                        </div>
                    </div>
                    <div class="seated-zones text-muted">
                        <div class="seated-zone seat-block" data-name="${getT(1)} Left" data-price="${getP(1)}">${getT(1)} Left <br>₹${getP(1)}</div>
                        <div class="seated-zone seat-block" data-name="${getT(2)} Center" data-price="${getP(2)}">${getT(2)} VIP <br>₹${getP(2)}</div>
                        <div class="seated-zone seat-block" data-name="${getT(1)} Right" data-price="${getP(1)}">${getT(1)} Right <br>₹${getP(1)}</div>
                    </div>
                </div>
            `;
        }

        function bindBlockEvents() {
            document.querySelectorAll('.seat-block').forEach(block => {
                block.addEventListener('click', (e) => {
                    const el = e.currentTarget;
                    const name = el.getAttribute('data-name');
                    const price = parseInt(el.getAttribute('data-price'));
                    const id = `BLK-${Date.now()}-${Math.floor(Math.random() * 1000)}`; // unique ID per click

                    // Visual feedback
                    el.classList.add('active');
                    setTimeout(() => el.classList.remove('active'), 200);

                    cart.push({ id: id, name: name, price: price });
                    updateCartUI();
                });
            });
        }

        // ------------------------------------
        // CART LOGIC
        // ------------------------------------

        function removeCartItem(id) {
            cart = cart.filter(item => item.id !== id);

            // If multiplex, uncheck seat visual
            const seat = document.querySelector(`.seat[data-id="${id}"]`);
            if (seat) seat.classList.remove('selected');

            updateCartUI();
        }

        function updateCartUI() {
            const listEl = document.getElementById('cart-items');
            const breakdownEl = document.getElementById('cart-breakdown');
            const totalEl = document.getElementById('total-price');
            const btn = document.getElementById('proceed-btn');

            listEl.innerHTML = '';
            breakdownEl.innerHTML = '';
            let subtotal = 0;
            let finalTotal = 0;

            if (cart.length === 0) {
                listEl.innerHTML = '<div class="text-muted" style="text-align:center; padding: 20px 0; font-size:0.8rem;">No tickets selected yet.</div>';
            } else {
                cart.forEach(item => {
                    subtotal += item.price;
                    listEl.innerHTML += `
                        <div class="selection-item" style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:0.95rem;">
                            <span>${item.name}</span>
                            <span>₹${item.price} <button onclick="removeCartItem('${item.id}')" style="background:none; border:none; color:#e74c3c; cursor:pointer; margin-left:8px; font-weight:bold;">✕</button></span>
                        </div>
                    `;
                });
                
                const convFee = cart.length * 35; // ₹35 per ticket conv fee
                const gst = Math.round((subtotal + convFee) * 0.18);
                finalTotal = subtotal + convFee + gst;

                breakdownEl.innerHTML = `
                    <div style="border-top: 1px dashed var(--border-color); padding-top: 15px; margin-top: 15px;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:8px; color:var(--text-muted); font-size:0.85rem;">
                            <span>Subtotal</span>
                            <span>₹${subtotal}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; margin-bottom:8px; color:var(--text-muted); font-size:0.85rem;">
                            <span>Convenience Fee</span>
                            <span>₹${convFee}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; margin-bottom:8px; color:var(--text-main); font-weight:600; font-size:0.85rem;">
                            <span>GST (18%)</span>
                            <span>₹${gst}</span>
                        </div>
                    </div>
                `;
            }

            // Animate number change slightly
            totalEl.style.transform = 'scale(1.2)';
            setTimeout(() => totalEl.style.transform = 'scale(1)', 150);
            totalEl.innerText = `₹${finalTotal}`;

            if (cart.length > 0) {
                btn.removeAttribute('disabled');
                btn.innerHTML = `Checkout (${cart.length})`;
                if (!btn.classList.contains('btn-pulse')) btn.classList.add('btn-pulse');
            } else {
                btn.setAttribute('disabled', 'true');
                btn.innerHTML = `Checkout`;
                btn.classList.remove('btn-pulse');
            }
        }

        document.getElementById('proceed-btn').addEventListener('click', async () => {
            const userStr = localStorage.getItem('currentUser');
            const token = localStorage.getItem('token');

            if (!userStr || !token) {
                alert("Please log in to proceed to payment.");
                window.location.href = "login.html";
                return;
            }

            const subtotal = cart.reduce((sum, i) => sum + i.price, 0);
            const convFee = cart.length * 35;
            const gst = Math.round((subtotal + convFee) * 0.18);
            const total = subtotal + convFee + gst;

            const seats = cart.map(i => i.name).join(', ');

            // Redirect to Addons page with seat details
            const pendingCheckout = {
                movie_id: currentItem.id,
                item: currentItem,
                seats: seats,
                seatNames: cart.map(i => i.name),
                seatSubtotal: subtotal,
                convFee: convFee,
                seatGst: gst,
                seatTotal: total,
                city: currentCity,
                theatre: currentTheatre,
                date: currentDisplayDate,
                apiDate: currentShowDate,
                time: currentShowTime
            };

            localStorage.setItem("pendingCheckout", JSON.stringify(pendingCheckout));
            document.body.classList.add('page-transitioning');
            setTimeout(() => window.location.href = "addons.html", 400);
        });
    </script>

</body>

</html>
