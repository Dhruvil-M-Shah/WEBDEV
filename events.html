<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Movie Ticket System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header {
            padding: 60px 0 40px;
            border-bottom: 2px dashed var(--accent-color);
            margin-bottom: 40px;
        }

        .category-filters {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        .category-filters::-webkit-scrollbar {
            display: none;
        }

        .filter-tab {
            padding: 10px 25px;
            border: 2px solid var(--primary-color);
            background: rgba(245, 237, 214, 0.8);
            color: var(--primary-color);
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 1.1rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            box-shadow: 3px 3px 0px var(--ink-brown);
        }

        .filter-tab.active,
        .filter-tab:hover {
            background: var(--primary-color);
            color: var(--bg-color);
            border-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 4px 4px 0px var(--ink-brown);
        }
    </style>
</head>

<body class="page-transitioning">
    <div id="global-loader">
        <div class="spinner"></div>
    </div>
    <div id="navbar-container"></div>
    <div class="main-content container fade-in-section">
        <div class="page-header">
            <h1 class="section-heading-decorate text-main" style="padding-bottom:10px;">Trending Experiences</h1>
            <p class="text-muted" style="font-size:1.1rem; max-width:600px; margin-top:20px;">Discover live concerts,
                international cricket tours, comedy standups, and elite theatrical plays.</p>
        </div>

        <div class="category-filters">
            <button class="filter-tab active" data-filter="all">All Experiences</button>
            <button class="filter-tab" data-filter="concerts">Concerts</button>
            <button class="filter-tab" data-filter="sports">Sports</button>
            <button class="filter-tab" data-filter="events">Comedy & Events</button>
            <button class="filter-tab" data-filter="plays">Theatrical Plays</button>
        </div>
        <div id="grid" class="grid"></div>
    </div>
    <div id="footer-container"></div>
    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const grid = document.getElementById("grid");

            const allData = {
                concerts: categories.concerts || [],
                sports: categories.sports || [],
                events: categories.events || [],
                plays: categories.plays || []
            };

            const fullData = [...allData.concerts, ...allData.sports, ...allData.events, ...allData.plays];

            function renderGrid(dataList) {
                if (dataList.length > 0) {
                    grid.innerHTML = dataList.map(i => generateCardHTML(i, 'events')).join('');
                } else {
                    grid.innerHTML = `<p class="text-muted" style="grid-column: 1/-1; text-align:center; padding: 40px 0;">No experiences found in this category right now.</p>`;
                }
            }

            document.querySelectorAll('.filter-tab').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');

                    const filter = e.target.getAttribute('data-filter');

                    grid.style.opacity = '0';
                    setTimeout(() => {
                        if (filter === 'all') {
                            renderGrid(fullData);
                        } else {
                            renderGrid(allData[filter]);
                        }
                        grid.style.opacity = '1';
                    }, 200);
                });
            });

            // Initial render
            grid.style.transition = 'opacity 0.2s ease';
            renderGrid(fullData);
        });
    </script>
</body>

</html>
