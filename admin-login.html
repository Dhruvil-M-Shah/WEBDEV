<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Movie Ticket System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f8f8fb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 48px 40px 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
            border: 1px solid #eee;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #6c35de, #a855f7, #6c35de);
        }

        .shield-icon {
            width: 64px;
            height: 64px;
            background: #f3eeff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 1.8rem;
        }

        .login-card h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 6px;
        }

        .login-card .subtitle {
            font-size: 0.82rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e8e8e8;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.92rem;
            background: #fafafe;
            transition: all 0.25s;
            color: #1a1a1a;
        }

        .form-group input:focus {
            outline: none;
            border-color: #6c35de;
            box-shadow: 0 0 0 4px rgba(108, 53, 222, 0.08);
            background: #fff;
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #6c35de;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: #5a28c0;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(108, 53, 222, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-msg {
            background: #ffebee;
            color: #c62828;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
            text-align: left;
        }

        .back-link {
            display: block;
            margin-top: 24px;
            text-align: center;
            color: #999;
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #6c35de;
        }

        .login-footer {
            text-align: center;
            margin-top: 28px;
            font-size: 0.78rem;
            color: #ccc;
        }
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="shield-icon">🛡️</div>
            <h1>Admin Portal</h1>
            <p class="subtitle">Restricted Access</p>

            <div class="error-msg" id="error-msg"></div>

            <form id="admin-login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="admin@movietickets.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter admin password" required>
                </div>
                <button type="submit" class="btn-login">Login as Admin</button>
            </form>

            <a href="HOME PAGE.html" class="back-link">← Back to main site</a>

            <div class="login-footer">Movie Ticket System &copy; 2026</div>
        </div>
    </div>

    <script>
        // Force credential entry on every visit
        localStorage.removeItem('isAdmin');
        localStorage.removeItem('adminToken');

        document.getElementById('admin-login-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = 'none';

            try {
                const res = await fetch('https://webdev-05o3.onrender.com/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('isAdmin', 'true');
                    window.location.href = 'admin.html';
                } else {
                    errorMsg.textContent = data.message || 'Invalid admin credentials.';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Cannot connect to server. Ensure backend is running.';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
