<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theatre & Plays - Movie Ticket System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header {
            padding: 60px 0 40px;
            border-bottom: 2px dashed var(--accent-color);
            margin-bottom: 40px;
        }
    </style>
</head>

<body class="page-transitioning">
    <div id="global-loader">
        <div class="spinner"></div>
    </div>
    <div id="navbar-container"></div>
    <div class="main-content container fade-in-section">
        <div class="page-header">
            <h1 class="section-heading-decorate text-main" style="padding-bottom:10px;">Theatre & Plays</h1>
            <p class="text-muted" style="font-size:1.1rem; max-width:600px;">Immerse yourself in powerful drama, grand
                musicals, and intimate stage performances.</p>
        </div>
        <div id="grid" class="grid"></div>
    </div>
    <div id="footer-container"></div>
    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const grid = document.getElementById("grid");
            const data = categories.plays || [];
            if (data.length > 0) {
                grid.innerHTML = data.map(i => generateCardHTML(i, 'plays')).join('');
            } else {
                grid.innerHTML = `<p class="text-muted">No plays found.</p>`;
            }
        });
    </script>
</body>

</html>
