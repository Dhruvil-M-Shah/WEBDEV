<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Movie Ticket System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-box {
            background: #ffffff !important;
            border-color: var(--border-color) !important;
            border-radius: var(--radius-sm);
            padding: 50px 40px;
            max-width: 450px;
            margin: 0 auto;
            text-align: center;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-control {
            display: block;
            width: 100%;
            padding: 12px 16px;
            font-size: 1.05rem;
            border-radius: var(--radius-sm);
            margin-top: 8px;
            box-sizing: border-box;
            background-color: rgba(255, 255, 255, 0.4) !important;
            border: 1px dashed rgba(74, 92, 47, 0.4) !important;
            color: var(--ink-brown) !important;
            font-weight: 700;
            outline: none;
            transition: var(--transition-fast);
        }

        .form-control:focus {
            border-color: var(--primary-color) !important;
            box-shadow: 0 0 10px rgba(74, 92, 47, 0.2) !important;
            background-color: rgba(255, 255, 255, 0.8) !important;
        }
    </style>
</head>

<body class="page-transitioning">
    <div id="global-loader">
        <div class="spinner"></div>
    </div>
    <div id="navbar-container"></div>
    <div class="auth-wrapper fade-in-section">
        <div class="auth-box">
            <h2 class="section-heading-decorate" style="margin-bottom: 30px; color: var(--text-main);">Join the Club
            </h2>
            <form id="signup-form">
                <div class="form-group">
                    <label style="color: var(--ink-brown); font-weight: 700;">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label style="color: var(--ink-brown); font-weight: 700;">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label style="color: var(--ink-brown); font-weight: 700;">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Create a password" required
                        minlength="6">
                </div>
                <div class="form-group">
                    <label style="color: var(--ink-brown); font-weight: 700;">Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-control"
                        placeholder="Confirm your password" required minlength="6">
                </div>
                <p id="error-msg"
                    style="color:var(--primary-color); font-size: 0.9rem; text-align:center; margin-bottom: 15px; display:none;">
                </p>
                <button type="submit" class="btn btn-primary btn-block"
                    style="padding:15px; font-size:1.1rem; width: 100%; margin-top: 10px;">Sign
                    Up</button>
            </form>
            <div class="text-center mt-3" style="font-size: 0.9rem; color: var(--text-muted);">
                Already have an account? <a href="login.html"
                    style="color: var(--accent-color); font-weight:600; text-transform:uppercase; letter-spacing:1px; margin-left:5px; text-decoration:none;">Login</a>
            </div>
        </div>
    </div>
    <div id="footer-container"></div>
    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
    document.getElementById('signup-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm-password').value;
        const errorMsg = document.getElementById('error-msg');

        if (password !== confirm) {
            errorMsg.innerText = "Passwords do not match.";
            errorMsg.style.display = "block";
            return;
        }

        try {
            const res = await fetch('https://webdev-05o3.onrender.com/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password, phone: '' })
            });

            const data = await res.json();

            if (res.ok) {
                const loginRes = await fetch('https://webdev-05o3.onrender.com/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const loginData = await loginRes.json();
                localStorage.setItem('currentUser', JSON.stringify(loginData.user));
                localStorage.setItem('token', loginData.token);
                window.location.href = "HOME PAGE.html";
            } else {
                errorMsg.innerText = data.message || "Signup failed. Try again.";
                errorMsg.style.display = "block";
            }
        } catch (error) {
            errorMsg.innerText = "Cannot connect to server. Make sure backend is running.";
            errorMsg.style.display = "block";
        }
    });
</script>
</body>

</html>
